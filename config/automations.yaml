- id: '1783636325325'
  alias: test_bluetooth
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.viet_ngoc_samsung_bluetooth_connection
    to:
    - '"0"'
    - '0'
    variables:
      disconnect_from_mb: '{% set mb_ble = "48:F0:7B:3A:E9:8B (MB Bluetooth 61471)"
        %} {{ mb_ble is in trigger.from_state.attributes.connected_paired_devices
        }}

        '
  - alias: Viet Ngoc disconnected from Android Auto
    trigger: state
    entity_id: binary_sensor.viet_ngoc_samsung_android_auto
    from: 'on'
    to: 'off'
    id: androidauto
  conditions:
  - condition: or
    conditions:
    - condition: trigger
      id:
      - androidauto
    - condition: template
      value_template: '{{ disconnect_from_mb }}'
  actions:
  - variables:
      notify_action: notify.mobile_app_viet_ngoc_samsung
      geocoded: sensor.viet_ngoc_samsung_geocoded_location
      device_tracker: device_tracker.viet_ngoc_samsung
  - action: notify.send_message
    metadata: {}
    target:
      entity_id: notify.viet_ngoc_samsung
    data:
      message: "{{ disconnect_from_mb }} \n{{ states(geocoded) }}"
  mode: single
