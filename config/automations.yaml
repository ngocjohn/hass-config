      - entity_id: switch.roidmi_eve_update_map
        action: "{% if states('vacuum.roidmi_eve') in [\"unavailable\", \"unknown\",
          \"docked\", \"idle\", \"paused\", \"charging\"] %}\n  switch.turn_off\n{%
          else %}\n  switch.turn_on\n{% endif %}\n"
    default:
    - entity_id: switch.roidmi_eve_update_map
      action: "{% if trigger.to_state.state in [\"unavailable\", \"unknown\", \"docked\",
        \"idle\", \"paused\", \"charging\"] %}\n  switch.turn_off\n{% else %}\n  switch.turn_on\n{%
        endif %}\n"
  mode: restart
