    action: notify.mobile_app_viet_ngoc_samsung
    metadata: {}
    data:
      message: '{{street}}

        '
      title: "\U0001F4CD C Geo Location"
      data:
        tag: chi-geo-location
        actions:
        - action: action_show
          title: Open Map
  - wait_for_trigger:
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: action_show
    timeout:
