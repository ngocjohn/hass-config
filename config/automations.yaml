- id: '1777519494188'
  alias: Samsung next alarm
  description: ''
  triggers:
  - alias: Samsung Next Alarm Change Mode
    trigger: time
    at:
      entity_id: sensor.viet_ngoc_samsung_next_alarm
      offset: -00:01:00
    id: change_ringe_mode
  - trigger: time
    at: sensor.viet_ngoc_samsung_next_alarm
  conditions:
  - condition: state
    entity_id: person.viet_ngoc
    state:
    - home
  actions:
  - if:
    - condition: trigger
      id:
      - change_ringe_mode
    then:
    - action: notify.mobile_app_viet_ngoc_samsung
      metadata: {}
      data:
        message: command_ringer_mode
        data:
          command: normal
      alias: Set Ringer Mode Normal
    else:
    - condition: template
      value_template: '{{states("input_select.next_alarm_homepod") != "none"}}'
    - action: script.samsung_alarm
      metadata: {}
      data:
        target_player: '{{states.input_select.next_alarm_homepod.state}}'
  mode: restart
- id: '1778338204194'
  alias: kodi_video_scan
  description: ''
  triggers: []
  conditions: []
  actions:
  - event: update_thumbnail
    event_data: {}
  mode: single
- id: '1779062484339'
  alias: next alarm pick homepod
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.viet_ngoc_samsung_next_alarm
    from:
    - unavailable
    - unknown
    to:
  conditions: []
  actions:
  - variables:
      action_living: media_player.living_room_2
      action_bed: media_player.bedroom
      action_office: media_player.office_homepod
    alias: Set up variables homepods
  - alias: Ask to pick device
    action: notify.mobile_app_viet_ngoc_samsung
    metadata: {}
    data:
      data:
        actions:
        - action: '{{ action_living}}'
          title: Living Room
        - action: '{{ action_bed }}'
          title: Bedroom
        - action: '{{ action_office }}'
          title: Office
      title: Choose the homepod
      message: '{% set current = states.input_select.next_alarm_homepod.state %}

        Current: {{state_attr(current, "friendly_name")}}'
  - wait_for_trigger:
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: '{{ action_living }}'
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: '{{ action_bed }}'
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: '{{ action_office }}'
  - action: input_select.select_option
    metadata: {}
    target:
      entity_id: input_select.next_alarm_homepod
    data:
      option: '{{wait.trigger.event.data.action}}'
  mode: restart
- id: '1779586729328'
  alias: Youtube TV Content
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - media_player.living_room_tv
    to:
    - playing
    from:
    id: playing_changed
    for:
      hours: 0
      minutes: 0
      seconds: 5
    enabled: true
  - trigger: state
    entity_id:
    - media_player.living_room_tv
    attribute: media_duration
    for:
      hours: 0
      minutes: 0
      seconds: 2
    id: duration_change
  - trigger: state
    entity_id:
    - media_player.living_room_tv
    attribute: media_title
    for:
      hours: 0
      minutes: 0
      seconds: 2
    id: duration_change
  conditions:
  - condition: state
    entity_id: media_player.living_room_tv
    state:
    - YouTube
    attribute: app_name
  - condition: template
    value_template: '{% set tv_attr = trigger.to_state.attributes %}

      {% set duration_long = tv_attr.media_duration > 20 %}

      {% set has_metadata = tv_attr.media_title|string() is defined and tv_attr.media_artist|string()
      is defined  %}

      {{ duration_long and has_metadata }}'
  actions:
  - variables:
      active_player: '{{ trigger.to_state.attributes.active_child}}'
      media_title: '{{ trigger.to_state.attributes.media_title}}'
      media_artist: '{{ trigger.to_state.attributes.media_artist}}'
  - event: compute_youtube_image
    event_data:
      media_title: '{{media_title}}'
      media_artist: '{{media_artist}}'
  mode: single
