- id: '1696553366478'
  alias: 'Dishwasher Set Timer '
  description: ''
  triggers:
  - entity_id:
    - sensor.mycka_nadobi_operation_state
    to: run
    trigger: state
  conditions:
  - condition: template
    value_template: '{{has_value(mycka_remaining)}}'
  - condition: or
    conditions:
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.mycka_nadobi_remaining_program_time
        state: unknown
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.mycka_nadobi_remaining_program_time
        state: unavailable
    enabled: false
  actions:
  - action: timer.cancel
    metadata: {}
    target:
      entity_id: timer.dishwasher_remaining
    data: {}
  - action: timer.set_duration
    metadata: {}
    data:
      duration: '{% set seconds = (as_timestamp(states(''sensor.mycka_nadobi_remaining_program_time''))
        - as_timestamp(now())) | int %} {% set hours = (seconds // 3600) %} {% set
        minutes = (seconds % 3600) // 60 %} {% set secs = seconds % 60 %} {{ ''%02d:%02d:%02d''
        | format(hours, minutes, secs) }}'
    target:
      entity_id: timer.dishwasher_remaining
  - action: timer.start
    metadata: {}
    target:
      entity_id: timer.dishwasher_remaining
    data: {}
  variables:
    mycka_remaining: sensor.mycka_nadobi_remaining_program_time
  initial_state: true
  mode: restart
