- entity:
    - input_boolean.test_floorplan_card_inside
  state_action:
    - action: call-service
      service: floorplan.card_set
      service_data:
        container_id: CardTopLeft
        config:
          type: custom:mediocre-massive-media-player-card
          entity_id: media_player.office_homepod
          use_art_colors: true
          mode: in-card
          action:
            tap_action:
              action: none
            hold_action:
              action: none
            double_tap_action:
              action: none
          speaker_group:
            entity_id: media_player.office_homepod
            entities:
              - media_player.bathroom
              - media_player.bedroom
              - media_player.office_homepod
              - media_player.living_room_2
          media_browser:
            - entity_id: media_player.office_homepod
              name: Office homepod
          ma_entity_id: media_player.office_homepod
          options:
            always_show_power_button: true

- entity: input_boolean.test_floorplan_card_inside
  element: CardTopLeft
  state_action:
    action: call-service
    service: floorplan.class_set
    service_data: 'card-${entity.state}'
