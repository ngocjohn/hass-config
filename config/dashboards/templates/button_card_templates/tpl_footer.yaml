#################################################
#                                               #
#               POP UP                          #
#                                               #
#################################################
icon_name:
  template:
    - extra_styles
  size: 1.4em
  color: '#9da0a2'
  styles:
    grid:
      - grid-template-areas: '"i n"'
      - grid-column-gap: 0.3em
    card:
      - color: '#9da0a2'
      - border-radius: 0.6em
      - padding: 1em 1.4em 1em 1.2em
      - width: max-content
      - font-size: 1.06em
      - font-weight: 500
      - letter-spacing: 0.03em
      - background: '#FFFFFF10'
icon_only:
  template:
    - extra_styles
  show_name: false
  color: '#9da0a2'
  styles:
    card:
      - color: '#9da0a2'
      - border-radius: 0.6em
      - width: 4em
      - height: 3.7em
      - background: '#FFFFFF10'
icon_sticky_menu:
  size: 1.7em
  show_name: false
  tap_action:
    card_bounce: |
      [[[
        // add animation
        if (this.getElementsByTagName("style").length === 0) {
            // phone condition
            let mq = window.matchMedia('(max-width: 800px)').matches;
            let style = document.createElement('style');
            style.innerHTML = `
                @keyframes card_bounce {
                    0%   { transform: scale(1); }
                    10%  { transform: scale(${ mq ? '0.92' : '0.94' }); }
                    25%  { transform: scale(1); }
                    30%  { transform: scale(${ mq ? '0.96' : '0.98' }); }
                    100% { transform: scale(1); }
                }
            `;
            this.appendChild(style);
        }
        // duration
        let duration = 800;
        // animate
        this.style.animation = `card_bounce ${duration}ms cubic-bezier(0.22, 1, 0.36, 1)`;
        // reset
        window.setTimeout(() => { this.style.animation = "none"; }, duration + 100)
      ]]]
    action: navigate
    haptic: medium
  styles:
    card:
      - background: none
      - --button-card-ripple-color: none
      - --mdc-ripple-press-opacity: 0.5
    icon:
      - color: '#ffffff'
chat_icon_only:
  show_name: false
  color: '#9da0a2'
  styles:
    card:
      - color: '#9da0a2'
      - border-radius: 50px
      - width: 3em
      - height: 3em
      - background-color: none
      - background-size: cover
      - background-position: center
      - background-image: 'url("/local/img/voice.png")'
remote_icon_only:
  show_name: false
  aspect_ratio: 1/1
  color: '#9da0a2'
  tap_action:
    haptic: heavy
  styles:
    card:
      - color: '#9da0a2'
      - border-radius: 0.6em
      - background: '#FFFFFF10'
remote_icon_arrow:
  variables:
    state_on: >
      [[[ return ['on', 'playing', 'idle', 'standby', 'paused'].indexOf(!entity || entity.state) !== -1; ]]]
  show_name: false
  color: '#9da0a2'
  aspect_ratio: 1/1
  tap_action:
    haptic: heavy
  styles:
    card:
      - color: '#9da0a2'
      - border-radius: 0.6em
      - background: >
          [[[
            return variables.state_on
              ? 'rgba(250, 250, 250, 0.4)'
              : '#FFFFFF10';
          ]]]
    icon:
      - color: >
          [[[
            return variables.state_on
              ? '#000000'
              : '#9da0a2';
          ]]]
sidebar_icon_only:
  show_name: false
  color: '#9da0a2'
  styles:
    card:
      - color: '#9da0a2'
      - border-radius: 20%
      - height: 3em
      - width: 3.3em
      - border: 0.12vw solid rgba(115, 115, 115, 0.2)
      - background: '#FFFFFF10'
