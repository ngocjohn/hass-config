#################################################
#                                               #
#                     FOOTER                    #
#                                               #
#################################################
footer:
  template:
    - settings
    - tilt
    - extra_styles
  variables:
    notify: >
      [[[
        return false;
      ]]]
    tilt_options: >
      [[[
        return {
          max: 5,
          scale: 1.1,
          glare: true,
          'max-glare': 0.07,
          perspective: 1000,
          speed: 800,
          parallax: '10px'
        };
      ]]]
    hover_enable: >
      [[[ return true; ]]]
    notify_icon: >
      [[[
        return 'mdi:alert-rhombus';
      ]]]
  size: 2vw
  show_icon: false
  color: '#9da0a2'
  custom_fields:
    notify: >
      [[[
        if (Number.isInteger(variables.notify)) {
            return variables.notify;
        } else {
          if (variables.notify || Boolean(variables.notify)) {
            //return `<span style="font-weight: 900;">!</span>`;
            return `<ha-icon icon=${variables.notify_icon} style="padding: 0; margin: -2px; size: 1em;"></ha-icon>`;
          }
        }
      ]]]
  styles:
    card:
      # - color: >
      #     [[[
      #       return variables.notify
      #         ? '#b68349'
      #         : '#97989c';
      #     ]]]
      - color: '#97989c'
      - width: fit-content
      - border: 0.12vw solid rgba(115, 115, 115, 0.2)
      - transition: none
      - padding: 0 0 0.05vw 0
      - overflow: visible
      - --button-card-ripple-color: none
      # - background-color: >
      #     [[[
      #       return variables.notify
      #         ? '#ff81812e'
      #         : null;
      #     ]]]
    custom_fields:
      notify:
        - display: >
            [[[
              if (Number.isInteger(variables.notify)) {
                  return variables.notify > 0
                      ? 'initial'
                      : 'none';
              }
              else if (variables.notify) {
                  return variables.notify
                      ? 'initial'
                      : 'none';
              }
            ]]]
        - position: absolute
        - font-weight: 700
        - color: '#d6d6d6'
        - background: '#8b3333'
        - border-radius: 50%
        - text-align: center
        - text-overflow: unset
        - z-index: 1
  tap_action:
    haptic: light
  hold_action:
    action: block
  double_tap_action:
    action: block
#################################################
#                                               #
#                     UPDATES                   #
#                                               #
#################################################
base_updates:
  show_state: true
  show_name: false
  show_icon: false
  styles:
    state:
      - text-align: left
      - justify-self: left
      - white-space: normal
    card:
      - cursor: default !important
      - padding: 0 0 0.5em 0
      - letter-spacing: var(--mdc-typography-body1-letter-spacing)
      - --button-card-ripple-color: none
  extra_styles: |
    #card.disabled {
      pointer-events: unset !important;
    }
    #ripple {
      display: none;
    }
    #state {
      width: 100%;
    }

    .title {
      font-size: 1.3em;
      font-weight: 500;
      display: flex;
      gap: 0.3em;
      height: 100%;
      justify-content: center;
      width: max-content;
      align-items: center;
      line-height: 1;
    }
    .title > ha-icon {
      width: 1.4em;
      opacity: 0.5;
    }


    .subtitle {
      font-size: 0.95em;
      /* line-height: 2; */
      padding-left: 3px;
      /* padding-bottom: 10px; */
      font-weight: 500;
      color: #828383;
      margin-block: 0.5em 0;
    }
    a {
      color: var(--primary-color);
      text-decoration: none;
    }
    ul {
      padding-inline: inherit;
      font-size: 0.88em;
      display: flex;
      flex-direction: column;
      width: inherit;
      max-height: 350px;
      overflow: auto;
    }

    ul#updateList li {
      display: flex;
      border-bottom: 1px solid var(--app-header-edit-background-color);
      flex-direction: row;
      height: 100%;
      align-items: stretch;
    }

    ul#updateList li img {
      max-width: 40px;
      object-fit: contain;
      width: 100%;
      margin: 11px 16px;
      min-height: 40px;
    }
    ul#updateList li .infoNameBtn {
      display: flex;
      width: 100%;
      flex-direction: column;
      justify-content: flex-start;
    }
    ul#updateList li .infoNameBtn #infoName {
      line-height: 2;
    }

    ul#updateList li .secondary {
      --ha-button-height: 24px;
      display: flex;
      margin-top: 4px;
      align-items: center;
      flex: auto;
      justify-content: space-between;
      width: 100%;
    }

    ul#updateList li span {
      font-size: 0.7em;
      display: inline-flex;
      gap: 1em;
      background-color: #292929;
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--secondary-text-color);
    }

    code {
      background-color: var(--secondary-background-color);
    }
updates_hass:
  template:
    - base_updates
    - settings
  state_display: |
    [[[
      if (entity) {
          let available = states[variables.available].attributes.home_assistant;
          let links = new RegExp('<a href="([^"]+)"', "g"),
              installed = entity.state,
              hass_version_latest = states[variables.latest],
              hass_version_latest_beta = states[variables.latest_beta],
              hass_release_notes = states[variables.release_notes],
              hass_release_notes_beta = states[variables.release_notes_beta];
          let latest = installed.includes('b')
              ? hass_version_latest_beta.state
              : hass_version_latest.state;
          let release_notes = installed.includes('b')
              ? marked.parse(hass_release_notes_beta.attributes.body)
              : marked.parse(hass_release_notes.attributes.body);
          let subtitle = available === 0
              ? `${variables.translate_no_updates} <b>&larr;</b> ${installed}`
              : `${installed} <b>&rarr;</b> ${latest} ${variables.translate_available} ${String.fromCodePoint("0x1f389")}`;
          let output = available === 0
              ? '<ul></ul>'
              : release_notes.replace(links, '<a href="#" onclick="window.open(\'$1\')"');
          return `
            <div class="title">
              <ha-icon icon="mdi:home-assistant"></ha-icon> <span>Home Assistant</span>
            </div>
            <p class="subtitle">${subtitle}</p>
            ${output}
          `;
      }
    ]]]
  styles:
    card:
      - display: >
          [[[
            return states[variables.available].attributes.home_assistant > 0
              ? 'block'
              : 'none';
          ]]]
updates_hass_icon_name:
  template: icon_name
  icon: mdi:update
  styles:
    card:
      - opacity: >
          [[[
            return entity && (entity.state === states[variables.latest].state)
                ? '0.3'
                : '1';
          ]]]
      - display: >
          [[[
            return entity && (entity.state === states[variables.latest].state)
              ? 'none'
              : 'flex';
          ]]]
updates:
  template:
    - base_updates
    - settings
  state_display: |
    [[[
      // variables
      let output = '',
          updates = states[variables.updates],
          hacs_installed = states[variables.hacs_installed]?.attributes.repositories,
          hacs_update = states['update.hacs_update']?.attributes.installed_version,
          no_updates = variables.translate_no_updates,
          update_available = variables.translate_update_available,
          updates_available = variables.translate_updates_available;


      // subtitle
      let count = updates?.attributes.update_entities,
          subtitle = count === 0
              ? `${no_updates} <b>&larr;</b> ${hacs_update || ''}`
              : `${count} ${count === 1 ? update_available : updates_available} ${String.fromCodePoint('0x1f389')}`;


      return `
        <div class="title">
          <ha-icon icon="mdi:package-up"></ha-icon>
          <span> Integrations </span>
        </div>
        <p class="subtitle">${subtitle}</p>
      `;
    ]]]

update_entity:
  show_state: false
  show_label: true
  show_name: true
  show_entity_picture: true
  show_icon: true
  show_ripple: false
  icon: mdi:package-variant-plus
  label: >
    [[[
      let attr = entity?.attributes;
      return `
        <span>${attr?.installed_version} <b>&rarr;</b> ${attr?.latest_version}</span>`;
    ]]]
  tap_action:
    action: more-info

  styles:
    grid:
      - grid-template-areas: |
          "i n up_btn skip_btn"
          "i l up_btn skip_btn"
      - grid-template-columns: 40px 1fr max-content max-content
      - grid-column-gap: 8px
    card:
      - padding: 0.5em
      - background: none
      - text-align: left
      - height: auto
  custom_fields:
    up_btn:
      card:
        type: custom:button-card
        entity: '[[[ return entity.entity_id ]]]'
        variables:
          service: update.install
          button_label: Install
        template: update_button
    skip_btn:
      card:
        type: custom:button-card
        entity: '[[[ return entity.entity_id ]]]'
        variables:
          service: update.skip
          button_label: Skip
        template: update_button
  extra_styles: |
    #name {
      font-size: 1em !important;
      place-self: flex-start !important;
      max-width: 100%;
      text-align: left !important;
      padding-left: 2px;
      line-height: 1.2em;
      padding-bottom: 4px !important;
    }
    #label {
      font-size: 0.7em !important;
      display: inline-flex;
      gap: 1em;
      background-color: #292929;
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--secondary-text-color);
      place-self: flex-start !important;
      align-items: center;
      height: fit-content;
    }
    #img-cell {
      height: auto;
      position: inherit;
      background: none !important;
      max-width: 40px;
      object-fit: contain;
      min-height: 40px;
    }
    #img-cell img {
      width: 100% !important;
      object-fit: contain;
      position: relative !important;
    }
update_button:
  show_state: true
  show_label: false
  show_name: false
  show_icon: false
  show_ripple: false
  tap_action:
    action: call-service
    service: '[[[ return variables.service ]]]'
    target:
      entity_id: '[[[ return entity.entity_id ]]]'
  state_display: |
    [[[
      let variant = variables.button_label.toLowerCase() === 'skip' ? 'warning' : 'brand';
      return `
        <ha-button size="small" appearance="plain" variant="${variant}">${variables.button_label}</ha-button>
      `;
    ]]]

updates_icon_name:
  template: icon_name
  icon: mdi:open-in-new
  styles:
    card:
      - opacity: >
          [[[
            return entity?.attributes?.update_entities === 0
                ? '0.3'
                : '1';
          ]]]
      - display: >
          [[[
            return entity?.attributes?.update_entities === 0
              ? 'none'
              : 'flex';
          ]]]
hacs_iframe:
  tap_action:
    action: fire-dom-event
    browser_mod:
      service: browser_mod.popup
      data:
        content:
          type: iframe
          aspect_ratio: 9/16
          url: >
            [[[ return `/${hass.panels.config.url_path}/updates`; ]]]
  template: icon_name
hacs_navigate_ios:
  tap_action:
    action: navigate
    navigation_path: /config/updates

  template: icon_name
