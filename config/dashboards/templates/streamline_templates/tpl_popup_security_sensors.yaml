popup_security_sensors:
  default:
    - title: Sensors
    - group_entity_id: group.motion_sensors
  card:
    type: custom:auto-entities
    card:
      type: entities
      title: '[[title]]'
      show_header_toggle: false
      card_mod:
        class: header
    filter:
      include:
        - options:
            secondary_info: last-changed
            state_color: true
          group_expanded:
            group: '[[group_entity_id]]'
            active_choice: group
      exclude:
        - options: {}
          state: unavailable
    rename:
      find: Motion Sensor|Contact Sensor | ?Occupancy| ?Door| ?Room
    sort:
      - method: state
        reverse: true
      - method: last_changed
        reverse: true
