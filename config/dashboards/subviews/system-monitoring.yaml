badges:
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.ha_system_cpu_usage
    name: Processor
    show_entity_picture: false
    state_content: state
    tap_action:
      action: none

cards: []
header:
  layout: start
  badges_position: top
  badges_wrap: scroll
# footer:
