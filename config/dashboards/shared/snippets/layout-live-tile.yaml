grid-template-columns: 'repeat(auto-fill, [col-start] minmax(143px, 1fr) [col-end])'
grid-template-rows: auto
column-gap: 4px
row-gap: 4px
margin: -1
mediaquery:
  '(max-width: 1023.99px)':
    grid-template-columns: 'repeat(auto-fill, [col-start] minmax(143px, 1fr) [col-end])'
    grid-template-rows: auto
    margin: -1
