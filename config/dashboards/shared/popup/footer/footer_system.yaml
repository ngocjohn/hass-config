action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: System Information
    adaptive: true
    style: >
      --max-popup-column: 3;
      --bar-card-border-radius: 12px;
    content:
      type: custom:mod-card
      card_mod: !include ../../snippets/style_popup_footer.yaml
      card:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout: !include ../../snippets/popup_footer_layout.yaml
        cards:
          #################################################
          #                                               #
          #                HOME ASSISTANT                 #
          #                                               #
          #################################################
          - type: entities
            title: Home Assistant
            show_header_toggle: false
            card_mod:
              class: header
            entities:
              - entity: sensor.current_version
                name: Installed
                icon: mdi:home-assistant
              - entity: sensor.template_hass_next_release
              - entity: sensor.ha_db
                name: Database
                icon: mdi:database
              - type: custom:bar-card
                card_mod: &bar_card_mod
                  class: barcard
                  style:
                    .: |
                      bar-card-name {
                        padding-left: 0.25em;
                        letter-spacing: normal;
                      }

                width: 55%
                height: 2em
                decimal: 0
                # unit_of_measurement: '%'
                positions: &bar_card_positions
                  icon: outside
                  indicator: 'off'
                  name: outside
                severity: &bar_card_severity
                  - color: '#9da0a2'
                    from: 0
                    to: 59
                  - color: '#6d2525'
                    from: 60
                    to: 100
                entity_row: true
                entities:
                  - entity: sensor.ha_system_cpu_usage
                    name: Processor
                  - entity: sensor.ha_system_cpu_thermal_0_temperature
                    name: Temperature
                    icon: mdi:thermostat
                  - entity: sensor.ha_system_memory_usage
                    name: Memory
                    icon: mdi:memory
                  - entity: sensor.ha_system_data_disk_usage
                    name: Disk used
                    icon: mdi:harddisk
              - type: section
              - type: custom:hui-horizontal-stack-card
                cards:
                  - type: custom:button-card
                    name: Restart
                    icon: mdi:reload
                    tap_action:
                      action: call-service
                      confirmation:
                        text: Are you sure you want to restart?
                      service: homeassistant.restart
                    template: icon_name
                  - type: custom:button-card
                    name: Reload YAML
                    icon: mdi:reload
                    tap_action:
                      action: call-service
                      service: browser_mod.sequence
                      service_data:
                        sequence:
                          - service: browser_mod.notification
                            data:
                              message: Reload all YAML configuration...
                          - service: homeassistant.reload_all
                    template: icon_name
                  - type: custom:button-card
                    name: Frontend
                    icon: mdi:broom
                    template: icon_name
                    tap_action:
                      action: fire-dom-event
                      browser_mod:
                        service: browser_mod.refresh
          #################################################
          #                                               #
          #                Raspberry Docker               #
          #                                               #
          #################################################
          - type: entities
            title: Raspberry Docker
            show_header_toggle: false
            card_mod:
              class: header
            entities:
              - entity: binary_sensor.pidocker_status_2
                icon: si:docker
                state_color: true
                name: Raspberry Docker
              - entity: sensor.pidocker_local_ipv4_address
                name: &name_type
                  type: entity
              - entity: sensor.pidocker_uptime
                icon: mdi:clock
                time_format: total
                name: *name_type
              - type: custom:bar-card
                card_mod: *bar_card_mod
                width: 55%
                height: 2em
                decimal: 0
                positions: *bar_card_positions
                severity: *bar_card_severity
                entity_row: true
                entities:
                  - entity: sensor.pidocker_cpu_load
                    name: Processor
                    icon: mdi:chip
                  - entity: sensor.pidocker_cpu_temperature
                    name: Temperature
                    icon: mdi:thermostat
                  - entity: sensor.pidocker_memory_usage
                    name: Memory 4GB
                    icon: mdi:memory
                  - entity: sensor.pidocker_disk_usage
                    name: SD used 32GB
                    icon: mdi:content-save
                    unit_of_measurement: '%'
              - type: section
              - type: custom:hui-horizontal-stack-card
                cards:
                  - type: custom:button-card
                    name: Reboot RPI
                    icon: mdi:reload
                    tap_action:
                      action: call-service
                      confirmation:
                        text: Are you sure you want to restart?
                      service: button.press
                      service_data:
                        entity_id: button.pidocker_system_restart
                    template: icon_name
                  - type: custom:button-card
                    name: Purge logs
                    icon: mdi:archive-remove
                    tap_action:
                      action: call-service
                      service: script.purge_dockerlog
                    template: icon_name
          #################################################
          #                                               #
          #                CONTAINERS                     #
          #                                               #
          #################################################
          - type: custom:auto-entities
            card:
              type: entities
              title: Containers
              show_header_toggle: false
              card_mod:
                class: header
            entities:
              - entity: switch.appdaemon_mbpro
                name: AppDaemon Server
                state_color: true
                secondary_info: last-changed
              - type: section
            filter:
              template: |
                {%- set containers = label_devices('docker_containers') | list %}
                {%- for con in containers -%}
                {%- set name = device_name(con) -%}
                {%- set icon = "si:ubiquiti" if name == 'unifi-controller' else "si:"+name|lower -%}
                {{
                  {
                    'type': 'custom:streamline-card',
                    'template': 'docker_container_base',
                    'variables': {
                      'con_name': name | replace('-','_') |lower,
                      'icon': icon,
                      'name': name | capitalize
                    }
                  }
                }},
                {%- endfor %}
