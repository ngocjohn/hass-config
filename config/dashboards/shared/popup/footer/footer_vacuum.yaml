action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Roidmi EVE Plus
    style: >
      --max-popup-column: 3;
    content:
      type: custom:mod-card
      card_mod: !include ../../snippets/style_popup_footer.yaml
      card:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout: !include ../../snippets/popup_footer_layout.yaml
        cards:
          ### SUMMARY
          - type: entities
            title: Summary
            show_header_toggle: false
            card_mod:
              class: header
            entities:
              - entity: vacuum.roidmi_eve
                name: Roidmi EVE plus
                icon: custom:roborock
                secondary_info:
                  entity: sensor.roidmi_v60_029d_battery_level
                  postfix: ' %'
                  prefix: 'Battery: '
              - entity: sensor.roidmi_v60_029d_device_fault
                name: Device Fault
                icon: mdi:alert-circle-outline
              - entity: binary_sensor.roidmi_v60_029d_mop
                name: In Mopping
                icon: mdi:water
              - type: divider
              - entity: switch.roidmi_v60_029d_double_clean
                name: 'Cleaning x2'
                icon: 'mdi:map-marker-distance'
              - entity: select.roidmi_v60_029d_path_type
                name: 'Y-Mopping'
                icon: 'mdi:transit-detour'
              - entity: select.roidmi_v60_029d_mode
                name: 'Cleaning power'
                icon: 'mdi:wind-power-outline'
              - entity: select.roidmi_v60_029d_sweep_type
                name: 'Cleaning function'
                icon: 'mdi:vacuum-outline'
              - entity: select.roidmi_v60_029d_water_level
                name: 'Water use'
                icon: 'mdi:waves'
              - type: custom:mod-card
                card_mod:
                  style:
                    # horizontal bottom buttons
                    hui-horizontal-stack-card$: |
                      #root {
                        justify-content: space-between!important;
                        padding: 1em;
                      }
                card:
                  type: horizontal-stack
                  cards:
                    - type: custom:button-card
                      entity: vacuum.roidmi_eve
                      icon: mdi:play-pause
                      variables:
                        vacuum_action: |
                          [[[
                            if (entity) {
                            const service = entity.state === 'docked' || entity.state === 'paused'
                              ? 'vacuum.start'
                              : 'vacuum.pause';
                            return {
                              action: "call-service",
                              service: service,
                              target: { entity_id: entity.entity_id },

                            };
                            } else {
                            return { action: "none" };
                            }
                          ]]]
                      tap_action: '[[[ return variables.vacuum_action ]]]'
                      template: icon_only
                    - type: custom:button-card
                      entity: vacuum.roidmi_eve
                      icon: mdi:battery-charging
                      tap_action:
                        action: call-service
                        service: vacuum.return_to_base
                        service_data:
                          entity_id: vacuum.roidmi_eve
                      template: icon_only
                    - type: custom:button-card
                      icon: mdi:bell
                      tap_action:
                        action: call-service
                        service: script.vacuum_find_robot
                      template: icon_only
                    - type: custom:button-card
                      icon: mdi:delete-empty
                      tap_action:
                        action: call-service
                        service: script.vacuum_empty_bin
                      template: icon_only
          ### MAP
          - type: entities
            title: Map
            show_header_toggle: false
            card_mod:
              class: header nopadding
            entities:
              - !include vacuum_roidmi.yaml

          ## SETTINGS
          - type: entities
            title: Settings
            show_header_toggle: false
            entities:
              - entity: number.roidmi_v60_029d_volume
                name: Volume
                icon: mdi:volume-high
              - entity: switch.roidmi_v60_029d_mute
                name: Mute
                icon: mdi:volume-off
              - entity: switch.roidmi_v60_029d_lidar_collision
                name: Lidar Collision
                icon: 'mdi:radar'
              - entity: switch.roidmi_v60_029d_led_switch
                name: LED
                icon: mdi:led-strip-variant
              - entity: switch.roidmi_v60_029d_auto_boost
                name: Auto Boost
                icon: mdi:fan-auto
              - type: section
                label: Cleaning Stats
              - entity: sensor.utility_room_roidmi_eve_cleaning_area
                name:
                  type: entity
              - entity: sensor.utility_room_roidmi_eve_cleaning_time
                name:
                  type: entity
              # Total Stats
              - type: section
                label: Total Stats
              - type: attribute
                entity: vacuum.roidmi_eve
                attribute: 'custom.total_clean_areas'
                suffix: ' m²'
                name: Total Cleaning Area
                icon: mdi:map-marker-distance
              - type: attribute
                entity: vacuum.roidmi_eve
                attribute: 'custom.total_clean_time'
                suffix: ' min'
                name: Total Cleaning Time
                icon: mdi:clock-outline
              - type: attribute
                entity: vacuum.roidmi_eve
                attribute: 'custom.clean_counts'
                name: Total Cleaning Counts
                icon: mdi:counter
