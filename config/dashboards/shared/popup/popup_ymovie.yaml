action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    style: |
      --popup-min-width: 1080px;
    title: 'MASS'
    card_mod:
      style:
        #popup header
        .: |
          ha-dialog>ha-dialog-header {
            display: none;
          }
          @media (max-width: 450px), (max-height: 500px) {
            ha-dialog>ha-dialog-header {
              display: block;
            }
          }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        gap: 1%
        margin: 0
        grid-template-columns: 1fr
      cards:
        - type: custom:auto-entities
          filter:
            include:
              - entity_id: 'sensor.ymovie_added_*'
                options:
                  type: custom:button-card
                  template:
                    - added_movies
          card:
            type: custom:swipe-card
            start_card: 1
            parameters:
              pagination:
                type: bullets
                clickable: true
              autoplay:
                delay: 7000
                disableOnInteraction: false
                reverseDirection: false
                pauseOnMouseEnter: true
              speed: 650
              slidesPerView: auto
              roundLengths: true
              grabCursor: true
              loop: false
              spaceBetween: 50
              direction: vertical
              autoHeight: true
              followFinger: true
          card_param: cards
