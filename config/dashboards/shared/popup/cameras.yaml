action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Cameras
    style: >
      --max-popup-column: 2;
    content:
      type: custom:mod-card
      card_mod: !include ../snippets/style_popup_footer.yaml
      card:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout: !include ../snippets/popup_footer_layout.yaml
        cards:
          - &camera_card
            type: custom:webrtc-camera
            entity: camera.kids_room
            poster: /local/img/loader.svg
            mode: mjpeg
            ui: true
            style: >-
              video {aspect-ratio: 16/9; object-fit: fill;}
              .fullscreen {display: none;}
              .shortcuts {opacity: 0.6; top: unset; left: unset; bottom: 5px; right: 5px;
              display: flex; flex-direction: row; gap: 0.5em;}
          - <<: *camera_card
            entity: camera.doorway
            mode: mse
            media: video
            muted: true
            background: false
            shortcuts:
              - &play_button
                name: Play
                icon: mdi:play
                service: button.press
                service_data:
                  entity_id: button.doorway_start_rtsp_stream
              - &stop_button
                name: Stop
                icon: mdi:stop
                service: button.press
                service_data:
                  entity_id: button.doorway_start_rtsp_stream

