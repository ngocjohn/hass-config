action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Weather
    style: >
      --max-popup-column: 2;
    content:
      type: custom:mod-card
      card_mod: !include ../snippets/style_popup_footer.yaml
      card:
        type: custom:layout-card
        layout_type: custom:grid-layout
        layout: !include ../snippets/popup_footer_layout.yaml
        cards:
          - type: entities
            title: Prague
            entities:
              - type: custom:weather-forecast-card
                show_current: true
                show_forecast: true
                default_forecast: hourly
                tap_action:
                  action: more-info
                entity: weather.home
                show_condition_effects: false
                forecast:
                  mode: chart
                  show_sun_times: true
                  extra_attribute: wind_direction
                  scroll_to_selected: false
                  hourly_group_size: 1
                  use_color_thresholds: true
                forecast_action:
                  tap_action:
                    action: toggle-forecast
                current:
                  show_attributes:
                    - wind_gust_speed
                    - humidity
                    - visibility
                    - cloud_coverage

              # - type: custom:layout-card
              #   layout_type: custom:vertical-layout
              #   cards:
              #     - type: weather-forecast
              #       show_current: true
              #       show_forecast: true
              #       entity: weather.prague
              #       name: ' '
              #       forecast_type: hourly
              # - type: divider
              # - type: custom:weather-chart-card
              #   entity: weather.home
              #   show_main: false
              #   show_attributes: false
              #   forecast:
              #     condition_icons: false
              #     show_wind_forecast: false
          - type: entities
            title: Radar
            card_mod:
              class: header nopadding
            entities:
              - type: custom:weather-radar-card
                static_map: false
                map_style: Dark
                data_source: RainViewer-DarkSky
                show_scale: false
                show_range: false
                extra_labels: false
                center_longitude: 14.42036
                show_marker: false
                show_zoom: false
                center_latitude: 50.075763
                marker_latitude: 50.075763
                marker_longitude: 14.42036
                zoom_level: 5
                square_map: false
                show_recenter: true
                show_playback: false
