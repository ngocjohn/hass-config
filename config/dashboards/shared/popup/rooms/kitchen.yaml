action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Kitchen
    style: >
      --tablet-popup-header-color: rgba(0, 0, 0, 0);
      --popup-background-color: rgba(0, 0, 0, 0);
      --button-card-border-radius: 10%;
    card_mod:
      style:
        .: |

        layout-card:
          $grid-layout$:
            # card divider border
            .: |
              #root > * {
                margin: 0px !important;
              }
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        margin: 1.5%
        gap: 5%
        grid-template-columns: 1fr
      cards:
        - type: custom:auto-entities
          filter:
            include:
              - group: group.light_kitchen
                options:
                  type: custom:button-card
                  template:
                    - tpl_popup_base
                    - tpl_popup_light_action
              - entity_id: fan.hood_power
                options:
                  type: custom:button-card
                  template:
                    - tpl_popup_base
                    - tpl_popup_dev_action
              - entity_id: switch.mycka_nadobi_power
                options:
                  type: custom:button-card
                  template:
                    - tpl_popup_base
                    - tpl_popup_dev_action
              - entity_id: switch.hob_power
                options:
                  type: custom:button-card
                  template:
                    - tpl_popup_base
                    - tpl_popup_dev_action
          card:
            type: grid
            columns: 3
          card_param: cards

