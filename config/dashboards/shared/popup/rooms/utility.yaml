action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  style:
    --button-card-border-radius: 10%
  data:
    title: Utility Room
    adaptive: true
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout: !include ../../snippets/layout_room_popup.yaml
      cards:
        - type: custom:auto-entities
          filter:
            include:
              - entity_id: light.utility_room_light
                options:
                  type: custom:button-card
                  template:
                    - tpl_popup_light
              - entity_id: vacuum.roidmi_eve
                options:
                  type: custom:button-card
                  name: Roidmi Eve
                  tap_action: !include ../footer/footer_vacuum.yaml
                  double_tap_action: !include ../footer/footer_vacuum.yaml
                  template:
                    - tpl_popup_device
                    - icon_vacuum
              - entity_id: switch.washer_dryer_power
                options:
                  type: custom:button-card
                  template:
                    - tpl_popup_device
          card:
            type: grid
            columns: 3
          card_param: cards
